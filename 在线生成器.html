<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爆款标题在线生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        .toast { animation: fadeIn 0.3s, fadeOut 0.3s 2.7s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .favorite-btn:hover { transform: scale(1.1); }
        .star-rating i { cursor: pointer; transition: color 0.2s; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Toast提示 -->
    <div id="toast" class="fixed top-4 right-4 bg-green-500 text-white px-4 py-2 rounded shadow-lg hidden z-50">
        <i class="fa fa-check"></i> <span id="toastMsg">操作成功</span>
    </div>

    <div class="max-w-4xl mx-auto p-4">
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-gray-800"><i class="fa fa-fire text-red-500"></i> 爆款标题在线生成器</h1>
            <p class="text-gray-500 mt-2">选择公式、填入关键词，一键生成爆款标题</p>
        </header>

        <div class="grid md:grid-cols-3 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">选择公式类型</label>
                <select id="category" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                    <option value="数字型">数字型</option>
                    <option value="对比型">对比型</option>
                    <option value="悬念型">悬念型</option>
                    <option value="痛点型">痛点型</option>
                    <option value="情绪型">情绪型</option>
                    <option value="反常识型">反常识型</option>
                    <option value="权威背书型">权威背书型</option>
                    <option value="故事叙事型">故事叙事型</option>
                    <option value="利益承诺型">利益承诺型</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">目标平台</label>
                <select id="platform" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                    <option value="all">不限平台</option>
                    <option value="公众号">公众号</option>
                    <option value="小红书">小红书</option>
                    <option value="知乎">知乎</option>
                    <option value="抖音">抖音</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">关键词（选填）</label>
                <input id="keyword" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-red-500" placeholder="如：写作、副业、职场">
            </div>
        </div>

        <button onclick="generate()" class="w-full bg-red-500 text-white py-3 rounded-lg font-bold text-lg hover:bg-red-600 transition mb-4">
            <i class="fa fa-magic"></i> 生成标题
        </button>

        <!-- 标签切换 -->
        <div class="flex gap-2 mb-4 border-b pb-2">
            <button onclick="showTab('results')" id="tabResults" class="px-4 py-2 rounded-t bg-red-500 text-white font-medium">
                <i class="fa fa-list"></i> 生成结果
            </button>
            <button onclick="showTab('favorites')" id="tabFavorites" class="px-4 py-2 rounded-t bg-gray-200 text-gray-600 font-medium hover:bg-gray-300">
                <i class="fa fa-heart"></i> 收藏夹
            </button>
            <button onclick="showTab('history')" id="tabHistory" class="px-4 py-2 rounded-t bg-gray-200 text-gray-600 font-medium hover:bg-gray-300">
                <i class="fa fa-history"></i> 历史记录
            </button>
            <button onclick="showTab('report')" id="tabReport" class="px-4 py-2 rounded-t bg-gray-200 text-gray-600 font-medium hover:bg-gray-300">
                <i class="fa fa-bar-chart"></i> 分析报告
            </button>
        </div>

        <!-- 生成结果 -->
        <div id="resultsPanel" class="space-y-3"></div>

        <!-- 收藏夹 -->
        <div id="favoritesPanel" class="hidden">
            <div class="bg-white rounded-lg shadow p-4 mb-4">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-gray-700"><i class="fa fa-heart text-red-500"></i> 已收藏标题</h3>
                    <button onclick="clearFavorites()" class="text-sm text-gray-400 hover:text-red-500">
                        <i class="fa fa-trash"></i> 清空收藏
                    </button>
                </div>
            </div>
            <div id="favoritesList" class="space-y-3"></div>
        </div>

        <!-- 历史记录 -->
        <div id="historyPanel" class="hidden">
            <div class="bg-white rounded-lg shadow p-4 mb-4">
                <div class="flex justify-between items-center">
                    <h3 class="font-bold text-gray-700"><i class="fa fa-history text-blue-500"></i> 生成历史</h3>
                    <button onclick="clearHistory()" class="text-sm text-gray-400 hover:text-red-500">
                        <i class="fa fa-trash"></i> 清空历史
                    </button>
                </div>
            </div>
            <div id="historyList" class="space-y-3"></div>
        </div>

        <!-- 统计信息 -->
        <div id="statsPanel" class="mt-6 grid grid-cols-3 gap-4 hidden">
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div class="text-2xl font-bold text-blue-500" id="statTotal">0</div>
                <div class="text-sm text-gray-500">总生成数</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div class="text-2xl font-bold text-red-500" id="statFavorites">0</div>
                <div class="text-sm text-gray-500">收藏数</div>
            </div>
            <div class="bg-white rounded-lg shadow p-4 text-center">
                <div class="text-2xl font-bold text-green-500" id="statAvgRating">0</div>
                <div class="text-sm text-gray-500">平均评分</div>
            </div>
        </div>

        <!-- 统计分析报告（新增） -->
        <div id="reportSection" class="mt-6 hidden">
            <div class="bg-white rounded-lg shadow p-4">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-gray-700"><i class="fa fa-bar-chart text-green-500"></i> 标题效果统计分析</h3>
                    <div class="flex gap-2">
                        <button onclick="generateReport()" class="text-sm bg-green-500 text-white px-3 py-1.5 rounded hover:bg-green-600"><i class="fa fa-refresh"></i> 刷新报告</button>
                        <button onclick="exportReport()" class="text-sm bg-blue-500 text-white px-3 py-1.5 rounded hover:bg-blue-600"><i class="fa fa-download"></i> 导出报告</button>
                    </div>
                </div>
                <div id="reportContent"></div>
            </div>
        </div>

        <div class="mt-8 p-4 bg-blue-50 rounded-lg">
            <h3 class="font-bold text-blue-800"><i class="fa fa-lightbulb-o"></i> 使用技巧</h3>
            <ul class="mt-2 text-sm text-blue-700 space-y-1">
                <li>输入关键词可让生成的标题更精准</li>
                <li>选平台可筛选该平台已验证有效的公式</li>
                <li>生成后可点击收藏按钮保存喜欢的标题</li>
                <li>收藏后可评分标记，方便后续筛选</li>
                <li>建议每个选题生成5-10个标题，对比测试</li>
            </ul>
        </div>
    </div>

        "知名人物": ["马斯克", "巴菲特", "马云", "雷军", "张一鸣", "王兴", "刘强东", "罗永浩", "李笑来", "樊登", "罗振宇", "吴晓波", "刘润", "薛兆丰", "李诞"],
        "书名": ["原则", "穷查理宝典", "思考快与慢", "刻意练习", "深度工作", "原子习惯", "纳瓦尔宝典", "认知觉醒", "底层逻辑", "影响力", "富爸爸穷爸爸", "高效能人士的七个习惯", "复利思维"],
        "习惯": ["早起", "读书", "写作", "运动", "冥想", "复盘", "时间管理", "深度思考", "学习", "健身", "阅读", "记录", "计划", "总结", "分享", "输出", "输入", "迭代", "优化"],
        "成果": ["成功了", "搞定了", "解决了", "实现了", "达成了", "完成了", "做到了", "突破了", "超越了", "逆袭了", "翻盘了", "赢了", "成功了", "上岸了", "翻红了"],
        "好处": ["收益翻倍", "效率提升", "收入增加", "时间节省", "压力减轻", "烦恼减少", "机会增多", "认知升级", "能力提升", "人脉拓宽", "资源增加", "思维升级", "格局打开"],
        "负面结果": ["错过机会", "浪费时间", "后悔一生", "一事无成", "原地踏步", "越努力越穷", "走弯路", "踩坑", "吃亏", "被淘汰", "被边缘化", "失去竞争力"],
        "时间": ["一个月", "三个月", "半年", "一年", "三年", "五年", "十年", "大学毕业", "30岁", "35岁", "40岁", "创业初期", "转型期"],
        "投入": ["10分钟", "半小时", "1小时", "早起1小时", "睡前30分钟", "午休时间", "周末半天", "通勤时间", "碎片时间", "下班后2小时"],
        "周期": ["天", "周", "月", "年", "小时", "分钟"],
        "尝试": ["尝试", "实验", "测试", "探索", "研究", "实践", "复盘", "优化", "迭代", "调整"],
        "成就": ["终于成功了", "找到了方法", "实现了目标", "达成了梦想", "突破了瓶颈", "解决了问题", "完成了任务", "拿到了结果", "获得了回报"],
        "现象": ["努力没结果", "越忙越穷", "加班加不动", "学不会记不住", "做了没用", "付出了没回报", "努力了白费"],
        "意外": ["意想不到", "出乎意料", "令人震惊", "让人意外", "颠覆认知", "打破常识", "超出预期", "令人惊讶", "匪夷所思", "难以置信"],
        "变化惊人": ["变化惊人", "结果惊艳", "效果显著", "改变巨大", "蜕变明显", "成果惊人", "效果惊人", "变化巨大", "提升明显"]
    };

    let currentTab = 'results';
    let favorites = [];
    let history = [];
    let stats = { total: 0, avgRating: 0 };

    // 初始化
    function init() {
        loadFavorites();
        loadHistory();
        loadStats();
        generate();
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function fillTemplate(tpl, keyword) {
        return tpl.replace(/\{(\w+)\}/g, (match, key) => {
            const pool = fillers[key] || [key];
            const val = rand(pool);
            return keyword && Math.random() > 0.5 ? keyword : val;
        });
    }

    function generate() {
        const cat = document.getElementById("category").value;
        const keyword = document.getElementById("keyword").value.trim();
        const list = formulas[cat] || [];

        const count = Math.min(list.length, 10);
        const shuffled = [...list].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, count);

        // 保存到历史
        const timestamp = new Date().toLocaleString();
        const historyEntry = {
            id: Date.now(),
            category: cat,
            keyword: keyword,
            titles: selected.map(tpl => fillTemplate(tpl, keyword)),
            timestamp: timestamp
        };
        history.unshift(historyEntry);
        if (history.length > 20) history.pop();
        saveHistory();

        // 更新统计
        stats.total += count;
        saveStats();

        let html = `<div class="flex justify-between items-center mb-3">
            <h2 class="text-lg font-bold text-gray-700"><i class="fa fa-list"></i> 生成了 ${count} 个标题</h2>
            <button onclick="copyAll()" class="text-sm bg-gray-200 px-3 py-1 rounded hover:bg-gray-300 transition">
                <i class="fa fa-copy"></i> 复制全部
            </button>
        </div>`;

        selected.forEach((tpl, i) => {
            const title = fillTemplate(tpl, keyword);
            const isFav = favorites.some(f => f.title === title);
            html += `<div class="bg-white p-4 rounded-lg shadow-sm border hover:shadow-md transition">
                <div class="flex justify-between items-start">
                    <div class="flex-1">
                        <span class="inline-block bg-red-100 text-red-600 text-xs px-2 py-0.5 rounded mr-2">${cat}</span>
                        <span class="text-gray-800 font-medium">${title}</span>
                    </div>
                    <div class="flex gap-2 ml-2">
                        <button onclick="copyText('${title.replace(/'/g, "\\'")}')"
                            class="text-blue-500 hover:text-blue-700 transition px-2" title="复制">
                            <i class="fa fa-copy"></i>
                        </button>
                        <button onclick="toggleFavorite('${title.replace(/'/g, "\\'")}', '${cat}')"
                            class="favorite-btn ${isFav ? 'text-red-500' : 'text-gray-400'} hover:text-red-500 transition px-2" title="收藏">
                            <i class="fa fa-heart"></i>
                        </button>
                    </div>
                </div>
            </div>`;
        });

        document.getElementById('resultsPanel').innerHTML = html;
        showTab('results');
        updateStatsDisplay();
    }

    function showTab(tab) {
        currentTab = tab;
        document.getElementById('resultsPanel').classList.toggle('hidden', tab !== 'results');
        document.getElementById('favoritesPanel').classList.toggle('hidden', tab !== 'favorites');
        document.getElementById('historyPanel').classList.toggle('hidden', tab !== 'history');
        document.getElementById('statsPanel').classList.toggle('hidden', tab === 'results');
        document.getElementById('reportSection').classList.toggle('hidden', tab !== 'report');

        ['results', 'favorites', 'history', 'report'].forEach(t => {
            const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1));
            if (t === tab) {
                btn.classList.remove('bg-gray-200', 'text-gray-600');
                btn.classList.add('bg-red-500', 'text-white');
            } else {
                btn.classList.remove('bg-red-500', 'text-white');
                btn.classList.add('bg-gray-200', 'text-gray-600');
            }
        });

        if (tab === 'favorites') renderFavorites();
        if (tab === 'history') renderHistory();
        if (tab === 'report') generateReport();
    }

    function toggleFavorite(title, category) {
        const existing = favorites.find(f => f.title === title);
        if (existing) {
            favorites = favorites.filter(f => f.title !== title);
            showToast('已取消收藏');
        } else {
            favorites.push({
                id: Date.now(),
                title: title,
                category: category,
                rating: 0,
                timestamp: new Date().toLocaleString()
            });
            showToast('已添加收藏');
        }
        saveFavorites();
        updateStatsDisplay();
        generate(); // 刷新显示
    }

    function setRating(id, rating) {
        const fav = favorites.find(f => f.id === id);
        if (fav) {
            fav.rating = rating;
            saveFavorites();
            updateStatsDisplay();
            renderFavorites();
        }
    }

    function renderFavorites() {
        const list = document.getElementById('favoritesList');
        if (favorites.length === 0) {
            list.innerHTML = `<div class="text-center py-8 text-gray-400">
                <i class="fa fa-heart-o fa-2x mb-2"></i>
                <p>暂无收藏，点击生成结果中的心形图标收藏标题</p>
            </div>`;
            return;
        }

        // 按评分排序
        const sorted = [...favorites].sort((a, b) => b.rating - a.rating);

        list.innerHTML = sorted.map(f => `
            <div class="bg-white p-4 rounded-lg shadow-sm border">
                <div class="flex justify-between items-start mb-2">
                    <div class="flex-1">
                        <span class="inline-block bg-red-100 text-red-600 text-xs px-2 py-0.5 rounded mr-2">${f.category}</span>
                        <span class="text-gray-800 font-medium">${f.title}</span>
                    </div>
                    <button onclick="removeFavorite(${f.id})" class="text-gray-400 hover:text-red-500 ml-2">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
                <div class="flex justify-between items-center">
                    <div class="star-rating text-sm">
                        ${[1,2,3,4,5].map(s => `<i class="fa fa-star ${s <= f.rating ? 'text-yellow-500' : 'text-gray-300'}"
                            onclick="setRating(${f.id}, ${s})"></i>`).join('')}
                        <span class="ml-1 text-gray-500">${f.rating > 0 ? f.rating + '星' : '未评分'}</span>
                    </div>
                    <span class="text-xs text-gray-400">${f.timestamp}</span>
                </div>
            </div>
        `).join('');
    }

    function removeFavorite(id) {
        favorites = favorites.filter(f => f.id !== id);
        saveFavorites();
        updateStatsDisplay();
        renderFavorites();
        showToast('已移除收藏');
    }

    function clearFavorites() {
        if (confirm('确定要清空所有收藏吗？')) {
            favorites = [];
            saveFavorites();
            updateStatsDisplay();
            renderFavorites();
            showToast('已清空收藏');
        }
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if (history.length === 0) {
            list.innerHTML = `<div class="text-center py-8 text-gray-400">
                <i class="fa fa-history fa-2x mb-2"></i>
                <p>暂无历史记录</p>
            </div>`;
            return;
        }

        list.innerHTML = history.map(h => `
            <div class="bg-white p-4 rounded-lg shadow-sm border">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-sm font-medium text-gray-700">
                        <i class="fa fa-tag text-red-500"></i> ${h.category}
                        ${h.keyword ? `<span class="text-gray-400 ml-2">关键词: ${h.keyword}</span>` : ''}
                    </span>
                    <span class="text-xs text-gray-400">${h.timestamp}</span>
                </div>
                <div class="space-y-1">
                    ${h.titles.slice(0, 3).map(t => `
                        <div class="flex justify-between items-center text-sm">
                            <span class="text-gray-600">${t}</span>
                            <button onclick="copyText('${t.replace(/'/g, "\\'")}')"
                                class="text-blue-500 hover:text-blue-700">
                                <i class="fa fa-copy"></i>
                            </button>
                        </div>
                    `).join('')}
                    ${h.titles.length > 3 ? `<button onclick="showHistoryDetail(${h.id})" class="text-sm text-blue-500 hover:text-blue-700">
                        <i class="fa fa-angle-down"></i> 展开${h.titles.length - 3}条更多
                    </button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function showHistoryDetail(id) {
        const entry = history.find(h => h.id === id);
        if (!entry) return;

        // 显示全部标题的弹窗
        const titles = entry.titles.join('\n');
        copyText(titles);
    }

    function clearHistory() {
        if (confirm('确定要清空所有历史记录吗？')) {
            history = [];
            saveHistory();
            renderHistory();
            showToast('已清空历史');
        }
    }

    function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => showToast('已复制')).catch(() => fallbackCopy(text));
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast('已复制');
    }

    function copyAll() {
        const items = document.querySelectorAll("#resultsPanel .text-gray-800.font-medium");
        const texts = Array.from(items).map(el => el.textContent).join("\n");
        copyText(texts);
    }

    // LocalStorage 操作
    function saveFavorites() {
        localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(favorites));
    }

    function loadFavorites() {
        const saved = localStorage.getItem(STORAGE_KEYS.favorites);
        if (saved) favorites = JSON.parse(saved);
    }

    function saveHistory() {
        localStorage.setItem(STORAGE_KEYS.history, JSON.stringify(history));
    }

    function loadHistory() {
        const saved = localStorage.getItem(STORAGE_KEYS.history);
        if (saved) history = JSON.parse(saved);
    }

    function saveStats() {
        localStorage.setItem(STORAGE_KEYS.stats, JSON.stringify(stats));
    }

    function loadStats() {
        const saved = localStorage.getItem(STORAGE_KEYS.stats);
        if (saved) stats = JSON.parse(saved);
    }

    function updateStatsDisplay() {
        document.getElementById('statTotal').textContent = stats.total;
        document.getElementById('statFavorites').textContent = favorites.length;
        const rated = favorites.filter(f => f.rating > 0);
        const avg = rated.length > 0 ? (rated.reduce((s, f) => s + f.rating, 0) / rated.length).toFixed(1) : 0;
        document.getElementById('statAvgRating').textContent = avg;
    }

    function generateReport() {
        var reportSection = document.getElementById('reportSection');
        reportSection.classList.remove('hidden');

        var catCounts = {};
        favorites.forEach(function(f) { catCounts[f.category] = (catCounts[f.category] || 0) + 1; });
        var ratedFavs = favorites.filter(function(f) { return f.rating > 0; });
        var avgRating = ratedFavs.length > 0 ? (ratedFavs.reduce(function(s, f) { return s + f.rating; }, 0) / ratedFavs.length).toFixed(2) : '无评分数据';

        var topRated = favorites.filter(function(f) { return f.rating > 0; }).sort(function(a, b) { return b.rating - a.rating; }).slice(0, 5);
        var topCategories = Object.entries(catCounts).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 5);

        var reportContent = document.getElementById('reportContent');
        reportContent.innerHTML =
            '<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">' +
                '<div class="bg-blue-50 rounded p-3 text-center"><div class="text-xl font-bold text-blue-600">' + stats.total + '</div><div class="text-xs text-blue-500">总生成数</div></div>' +
                '<div class="bg-red-50 rounded p-3 text-center"><div class="text-xl font-bold text-red-600">' + favorites.length + '</div><div class="text-xs text-red-500">收藏数</div></div>' +
                '<div class="bg-green-50 rounded p-3 text-center"><div class="text-xl font-bold text-green-600">' + avgRating + '</div><div class="text-xs text-green-500">平均评分</div></div>' +
                '<div class="bg-purple-50 rounded p-3 text-center"><div class="text-xl font-bold text-purple-600">' + Object.keys(catCounts).length + '</div><div class="text-xs text-purple-500">公式类型数</div></div>' +
            '</div>' +
            '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">' +
                '<div class="bg-gray-50 rounded p-4"><h4 class="font-bold text-sm text-gray-700 mb-2"><i class="fa fa-star text-amber-500 mr-1"></i>高评分标题 TOP5</h4>' +
                    (topRated.length > 0 ? '<ul class="text-xs text-gray-600 space-y-2">' + topRated.map(function(f) { return '<li><span class="text-amber-500 font-bold">' + f.rating + '</span> ' + f.title.slice(0, 30) + '...' + '</li>'; }).join('') + '</ul>' : '<div class="text-gray-400 text-xs">暂无评分数据</div>') +
                '</div>' +
                '<div class="bg-gray-50 rounded p-4"><h4 class="font-bold text-sm text-gray-700 mb-2"><i class="fa fa-chart-bar text-blue-500 mr-1"></i>常用公式 TOP5</h4>' +
                    (topCategories.length > 0 ? '<ul class="text-xs text-gray-600 space-y-2">' + topCategories.map(function(c) { return '<li><span class="bg-red-100 text-red-600 px-2 py-0.5 rounded">' + c[1] + '</span> ' + c[0] + '</li>'; }).join('') + '</ul>' : '<div class="text-gray-400 text-xs">暂无收藏数据</div>') +
                '</div>' +
            '</div>' +
            '<div class="mt-4 p-4 bg-amber-50 rounded border border-amber-200">' +
                '<h4 class="font-bold text-sm text-amber-700 mb-2"><i class="fa fa-lightbulb-o mr-1"></i>优化建议</h4>' +
                '<ul class="text-xs text-amber-600 space-y-1">' +
                    (avgRating === '无评分数据' ? '<li>请为收藏的标题打分，以便生成更精准的分析报告</li>' : '') +
                    (topRated.length > 0 && avgRating < 3.5 ? '<li>收藏标题整体评分偏低，建议尝试其他公式类型</li>' : '') +
                    (topCategories.length > 0 && topCategories[0][1] > 5 ? '<li>高度依赖单一公式，建议拓展更多公式类型</li>' : '') +
                    '<li>建议每个选题生成5-10个标题进行A/B测试</li>' +
                    '<li>高评分标题值得复盘，分析其共性特征</li>' +
                '</ul>' +
            '</div>';
    }

    function exportReport() {
        var md = '# 爆款标题效果统计报告\n\n';
        md += '> 报告生成时间：' + new Date().toLocaleString() + '\n\n';
        md += '## 基础统计\n\n';
        md += '| 指标 | 数值 |\n|------|------|\n';
        md += '| 总生成数 | ' + stats.total + ' |\n';
        md += '| 收藏数 | ' + favorites.length + ' |\n';
        var ratedFavs = favorites.filter(function(f) { return f.rating > 0; });
        var avgRating = ratedFavs.length > 0 ? (ratedFavs.reduce(function(s, f) { return s + f.rating; }, 0) / ratedFavs.length).toFixed(2) : '无';
        md += '| 平均评分 | ' + avgRating + ' |\n\n';

        md += '## 高评分标题 TOP5\n\n';
        var topRated = favorites.filter(function(f) { return f.rating > 0; }).sort(function(a, b) { return b.rating - a.rating; }).slice(0, 5);
        if (topRated.length > 0) {
            topRated.forEach(function(f) { md += '- [' + f.rating + '星] ' + f.title + '\n'; });
        } else {
            md += '暂无评分数据\n';
        }
        md += '\n## 公式使用分布\n\n';

        var catCounts = {};
        favorites.forEach(function(f) { catCounts[f.category] = (catCounts[f.category] || 0) + 1; });
        Object.entries(catCounts).sort(function(a, b) { return b[1] - a[1]; }).forEach(function(c) {
            md += '- ' + c[0] + '：' + c[1] + '次\n';
        });

        md += '\n---\n\n*由爆款标题公式库自动生成*';

        var blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = '标题效果分析报告_' + new Date().toISOString().slice(0, 10) + '.md';
        a.click();
        URL.revokeObjectURL(url);
        showToast('报告已导出');
    }

    // 页面加载时初始化
    init();
    </script>
</body>
</html>
